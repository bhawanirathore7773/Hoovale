runtime: python-3.11
build:
  commands:
    - pip install -r requirements.txt
    - python manage.py migrate
    - python manage.py collectstatic --noinput

services:
  - type: web
    name: hoovale
    runtime: python
    startCommand: gunicorn hoovale.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATABASE_URL
        fromDatabase:
          name: hoovale_db
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "yourdomain.onrender.com"

databases:
  - name: hoovale_db
    databaseName: hoovale_db
    user: hoovale_user
    plan: free
