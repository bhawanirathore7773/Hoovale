{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="error-page py-5">
    <div class="container-lg">
        <div class="row align-items-center justify-content-center min-vh-50">
            <div class="col-md-8 col-lg-6 text-center" data-aos="fade-up">
                <div class="error-content">
                    <h1 class="error-code">404</h1>
                    <h2 class="error-title mb-3">Page Not Found</h2>
                    <p class="error-message text-muted mb-5">
                        Sorry, the page you're looking for doesn't exist. It might have been moved or deleted.
                    </p>
                    <div class="error-actions">
                        <a href="{% url 'home' %}" class="btn btn-primary btn-lg me-3">
                            <i class="fas fa-home"></i> Go Home
                        </a>
                        <a href="{% url 'products_list' %}" class="btn btn-outline-primary btn-lg">
                            <i class="fas fa-shopping-bag"></i> Shop Now
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
