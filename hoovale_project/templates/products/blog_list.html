{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="blog-page py-5">
    <div class="container-fluid px-4">
        <h1 class="page-title mb-5">Blog & Articles</h1>

        <div class="row g-4">
            {% for blog in blog_posts %}
            <div class="col-md-6 col-lg-4" data-aos="fade-up">
                <div class="blog-card">
                    <img src="{{ blog.featured_image.url }}" alt="{{ blog.title }}" class="blog-image">
                    <div class="blog-info">
                        <small class="blog-category">{{ blog.category }}</small>
                        <h5><a href="{{ blog.get_absolute_url }}">{{ blog.title }}</a></h5>
                        <p class="small text-muted">{{ blog.description|truncatewords:20 }}</p>
                        <small class="text-muted">{{ blog.created_at|date:"M d, Y" }}</small>
                        <div class="mt-3">
                            <a href="{{ blog.get_absolute_url }}" class="btn btn-sm btn-primary">Read More →</a>
                        </div>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12 text-center py-5">
                <p class="text-muted">No blog posts yet.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
